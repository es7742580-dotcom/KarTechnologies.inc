<!-- ДОБАВЬ ЭТО В ТЕГ <head> ВНУТРЬ <style> -->
<style>
    /* ... твои старые стили ... */

    /* Стили для визуального чертежа */
    #blueprint-container {
        position: relative;
        width: 100%;
        height: 200px;
        background: #0d1b2a;
        border: 2px solid #415a77;
        border-radius: 10px;
        margin-bottom: 15px;
        overflow: hidden;
    }

    /* Сетка для фона (создает эффект чертежа) */
    .blueprint-bg {
        position: absolute;
        width: 100%; height: 100%;
        background-image: 
            linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 20px 20px;
        z-index: 0;
    }

    /* Настройки для всех слоев */
    .layer-img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        z-index: 1;
        pointer-events: none;
        display: none; /* Скрыты по умолчанию */
    }
</style>

<!-- ЗАМЕНИ ТВОЮ ВКЛАДКУ КОНСТРУКТОРА НА ЭТУ -->
<div id="constructor-tab" class="tab-content">
    <h2>Верфь (Сборка корабля)</h2>
    
    <!-- Окно чертежа -->
    <div id="blueprint-container">
        <div class="blueprint-bg"></div>
        <img id="layer-hull" class="layer-img" src="" alt="Корпус">
        <img id="layer-main" class="layer-img" src="" alt="Гл. Калибр">
        <img id="layer-sec" class="layer-img" src="" alt="Вспом. Оружие">
        <img id="layer-armor" class="layer-img" src="" alt="Броня">
    </div>

    <!-- Обрати внимание на добавленный onchange="updateBlueprint()" -->
    <div class="form-group">
        <label>Корпус:</label>
        <select id="cb-hull" onchange="updateBlueprint()"><option value="0">Выберите корпус...</option></select>
    </div>
    <div class="form-group">
        <label>Главный калибр:</label>
        <select id="cb-main" onchange="updateBlueprint()"><option value="0">Выберите ГК...</option></select>
    </div>
    <div class="form-group">
        <label>Вспом. орудия:</label>
        <select id="cb-sec" onchange="updateBlueprint()"><option value="0">Выберите ПМК...</option></select>
    </div>
    <div class="form-group">
        <label>Бронирование:</label>
        <select id="cb-armor" onchange="updateBlueprint()"><option value="0">Выберите броню...</option></select>
    </div>
    
    <button class="btn" style="width: 100%; margin-top: 15px;">Построить корабль</button>
</div>
