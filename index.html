<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмиралтейство: Древо Науки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1c1c1e; color: white; margin: 0; padding: 15px; overflow-x: hidden; }
        .nav-tabs { display: flex; justify-content: space-around; margin-bottom: 20px; background: #2c2c2e; border-radius: 10px; padding: 5px; }
        .tab-btn { background: none; border: none; color: #8e8e93; padding: 10px; font-weight: bold; cursor: pointer; width: 50%; border-radius: 8px; }
        .tab-btn.active { background: #007aff; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Древо исследований */
        .tree-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .root-node { margin-bottom: 30px; }
        .branches-container { display: flex; justify-content: space-between; width: 100%; overflow-x: auto; gap: 15px; padding-bottom: 20px; }
        .branch { display: flex; flex-direction: column; gap: 20px; min-width: 120px; text-align: center; }
        .branch-title { font-size: 12px; color: #8e8e93; text-transform: uppercase; margin-bottom: 10px; }
        
        /* Кнопки технологий */
        .tech-node { background: #2c2c2e; padding: 15px 5px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; font-size: 13px; font-weight: bold; }
        .tech-node.locked { opacity: 0.5; filter: grayscale(1); border-color: #48484a; }
        .tech-node.available { border-color: #ff9f0a; box-shadow: 0 0 10px rgba(255, 159, 10, 0.3); }
        .tech-node.unlocked { border-color: #34c759; background: rgba(52, 199, 89, 0.1); }

        /* Модальное окно */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #2c2c2e; width: 90%; max-width: 350px; border-radius: 15px; padding: 20px; box-sizing: border-box; position: relative; text-align: center; }
        .modal-img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; background: #1c1c1e; }
        .modal-close { position: absolute; top: 10px; right: 15px; font-size: 24px; color: #8e8e93; cursor: pointer; background: none; border: none; }
        .modal-title { margin: 0 0 10px 0; font-size: 18px; color: #fff; }
        .modal-desc { font-size: 13px; color: #aeaea3; margin-bottom: 15px; text-align: left; }
        .modal-stats { background: #1c1c1e; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; text-align: left; }
        .btn-buy { background: #007aff; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-buy:disabled { background: #48484a; color: #8e8e93; cursor: not-allowed; }
        
        /* Конструктор и Слои Чертежа */
        label { display: block; margin-top: 12px; color: #aeaea3; font-size: 14px; }
        select { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: none; box-sizing: border-box; background: #2c2c2e; color: white; }
        
        #blueprint-container {
            position: relative;
            width: 100%;
            height: 200px;
            background: #0d1b2a;
            border: 2px solid #415a77;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .blueprint-bg {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 0;
        }
        .layer-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            z-index: 1;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('research')">🔬 Древо Науки</button>
        <button class="tab-btn" onclick="switchTab('constructor')">⚓ Верфь</button>
    </div>

    <div id="research-tab" class="tab-content active">
        <div class="tree-container">
            <div class="root-node" id="tree-root"></div>
            <div class="branches-container" id="tree-branches">
                <div class="branch" id="branch-hulls"><div class="branch-title">Корпуса</div></div>
                <div class="branch" id="branch-guns"><div class="branch-title">Гл. Калибр</div></div>
                <div class="branch" id="branch-sec"><div class="branch-title">Вспом. Орудия</div></div>
                <div class="branch" id="branch-armor"><div class="branch-title">Броня & ДВС</div></div>
            </div>
        </div>
    </div>

    <div id="constructor-tab" class="tab-content">
        <h3>Верфь (Сборка корабля)</h3>
        
        <div id="blueprint-container">
            <div class="blueprint-bg"></div>
            <img id="layer-hull" class="layer-img" src="" alt="Корпус">
            <img id="layer-main" class="layer-img" src="" alt="ГК">
            <img id="layer-sec" class="layer-img" src="" alt="ПМК">
            <img id="layer-armor" class="layer-img" src="" alt="Броня">
        </div>

        <label>Корпус:</label>
        <select id="cb-hull" onchange="updateBlueprint()"><option value="0">Выберите корпус...</option></select>
        
        <label>Главный калибр:</label>
        <select id="cb-main" onchange="updateBlueprint()"><option value="0">Выберите ГК...</option></select>
        
        <label>Вспомогательный калибр:</label>
        <select id="cb-sec" onchange="updateBlueprint()"><option value="0">Выберите ПМК...</option></select>
        
        <label>Броня & ДВС:</label>
        <select id="cb-armor" onchange="updateBlueprint()"><option value="0">Выберите оснащение...</option></select>
        
        <button class="btn-buy" style="margin-top: 20px;">Отправить чертеж</button>
    </div>

    <div class="modal-overlay" id="tech-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <img src="" class="modal-img" id="m-img" alt="Tech">
            <h2 class="modal-title" id="m-title">Название</h2>
            <div class="modal-desc" id="m-desc">Описание...</div>
            <div class="modal-stats" id="m-stats">Характеристики</div>
            <button class="btn-buy" id="m-buy-btn" onclick="buyCurrentTech()">Изучить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        if(tg) tg.expand();

        const db = {
            "root_steam": { id: "root_steam", name: "Паровой флот", branch: "root", type: "base", parentId: null, cost: 0, 
                desc: "Фундамент военного флота.", stats: "Открывает доступ к веткам.", img: "https://upload.wikimedia.org/wikipedia/commons/1/1a/HMS_Warrior_1860_Portsmouth.jpg", partImg: null, unlocked: true },
            
            "hull_1": { id: "hull_1", name: "Канонерская лодка", branch: "hulls", type: "hull", parentId: "root_steam", cost: 100,
                desc: "Малый корабль для береговой обороны.", stats: "Лимит веса: 800 т", img: "https://upload.wikimedia.org/wikipedia/commons/c/c5/Khrabryy1895.jpg", partImg: "", unlocked: false },
            
            "gun_1": { id: "gun_1", name: "152-мм Гладкоствол", branch: "guns", type: "main", parentId: "root_steam", cost: 100,
                desc: "Старая дульнозарядная пушка.", stats: "Урон: 15\nВес: 50 т", img: "https://upload.wikimedia.org/wikipedia/commons/1/17/6in_BL_gun_on_ship.jpg", partImg: "", unlocked: false },
            
            "sec_1": { id: "sec_1", name: "Картечница", branch: "sec", type: "sec", parentId: "root_steam", cost: 50,
                desc: "Многоствольный пулемет Гатлинга.", stats: "Урон: 5\nВес: 2 т", img: "https://upload.wikimedia.org/wikipedia/commons/c/c2/Gatling_gun_1865.jpg", partImg: "", unlocked: false },
            
            "arm_1": { id: "arm_1", name: "Железная броня", branch: "armor", type: "armor", parentId: "root_steam", cost: 150,
                desc: "Толстые листы кованого железа.", stats: "Защита: 20\nВес: 300 т", img: "https://upload.wikimedia.org/wikipedia/commons/4/4c/Ironclad_armor_sample.jpg", partImg: "", unlocked: false }
        };

        let currentSelectedTechId = null;

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            if(tabName === 'research') {
                document.getElementById('research-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('constructor-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                updateConstructorDropdowns();
            }
        }

        function renderTree() {
            document.getElementById('tree-root').innerHTML = '';
            ['hulls', 'guns', 'sec', 'armor'].forEach(b => {
                const branchEl = document.getElementById(`branch-${b}`);
                if(branchEl) {
                    const title = branchEl.querySelector('.branch-title').innerText;
                    branchEl.innerHTML = `<div class="branch-title">${title}</div>`;
                }
            });

            Object.values(db).forEach(tech => {
                const node = document.createElement('div');
                node.className = `tech-node`;
                node.innerText = tech.name;
                node.onclick = () => openModal(tech.id);

                if (tech.unlocked) {
                    node.classList.add('unlocked');
                } else {
                    if (tech.parentId && db[tech.parentId].unlocked) {
                        node.classList.add('available');
                    } else {
                        node.classList.add('locked');
                    }
                }

                if (tech.branch === 'root') {
                    document.getElementById('tree-root').appendChild(node);
                } else {
                    const targetBranch = document.getElementById(`branch-${tech.branch}`);
                    if(targetBranch) targetBranch.appendChild(node);
                }
            });
        }

        function openModal(id) {
            const tech = db[id];
            currentSelectedTechId = id;
            
            document.getElementById('m-title').innerText = tech.name;
            document.getElementById('m-desc').innerText = tech.desc;
            document.getElementById('m-stats').innerText = tech.stats;
            
            const imgEl = document.getElementById('m-img');
            imgEl.src = tech.img || "";
            imgEl.onerror = function() { this.src = 'https://upload.wikimedia.org/wikipedia/commons/3/3f/Placeholder_view_vector.svg'; };

            const buyBtn = document.getElementById('m-buy-btn');
            if (tech.unlocked) {
                buyBtn.innerText = "Уже изучено";
                buyBtn.disabled = true;
            } else if (tech.parentId && !db[tech.parentId].unlocked) {
                buyBtn.innerText = "🔒 Требуется предыдущая";
                buyBtn.disabled = true;
            } else {
                buyBtn.innerText = `Изучить (${tech.cost} Очков)`;
                buyBtn.disabled = false;
            }

            document.getElementById('tech-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('tech-modal').style.display = 'none';
        }

        function buyCurrentTech() {
            if (!currentSelectedTechId) return;
            db[currentSelectedTechId].unlocked = true;
            closeModal();
            renderTree();
            if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        }

        function updateConstructorDropdowns() {
            const selects = { 'hull': 'cb-hull', 'main': 'cb-main', 'sec': 'cb-sec', 'armor': 'cb-armor' };
            Object.values(selects).forEach(id => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = '<option value="0">Выберите узел...</option>';
            });

            Object.values(db).forEach(tech => {
                if (tech.unlocked && tech.type !== 'base') {
                    const opt = document.createElement('option');
                    opt.value = tech.id;
                    opt.innerText = tech.name;
                    const targetSelect = document.getElementById(selects[tech.type]);
                    if(targetSelect) targetSelect.appendChild(opt);
                }
            });
        }

        function updateBlueprint() {
            const parts = {
                'hull': document.getElementById('cb-hull').value,
                'main': document.getElementById('cb-main').value,
                'sec': document.getElementById('cb-sec').value,
                'armor': document.getElementById('cb-armor').value
            };

            for (const [type, id] of Object.entries(parts)) {
                const layerElement = document.getElementById(`layer-${type}`);
                if (layerElement) {
                    if (id !== "0" && db[id] && db[id].partImg) {
                        layerElement.src = db[id].partImg;
                        layerElement.style.display = "block";
                    } else {
                        layerElement.style.display = "none";
                        layerElement.src = "";
                    }
                }
            }
        }

        // Старт
        renderTree();
    </script>
</body>
</html>
